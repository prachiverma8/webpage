<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prachi Verma</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 35px 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            color: #333;
        }

        .roll {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #555;
        }

        .roll span {
            font-weight: bold;
            color: #222;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Prabhjot Kaur</h1>
        <div class="roll">
            Roll No: <span>14001012023</span>
        </div>
        <h1>Prachi Verma</h1>
        <div class="roll">
            Roll No: <span>14201012023</span>
        </div>
        <h1>Prerna Maharda</h1>
        <div class="roll">
            Roll No: <span>14701012023</span>
        </div>
    </div>
</body>
</html>
